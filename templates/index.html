<!DOCTYPE html>
<html>
<head>
    <title>Phishing Email Detector</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:35px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:220px;
    border:none;
    border-radius:12px;
    padding:15px;
    resize:none;
    font-size:15px;
    background:#f8fafc;
    outline:none;
}

textarea:focus{
    box-shadow:0 0 0 3px rgba(45,212,191,0.4);
}

button{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#14b8a6,#06b6d4);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(20,184,166,0.4);
}

.result{
    margin-top:25px;
    text-align:center;
    padding:15px;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    font-size:22px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#cbd5e1;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Phishing Email Detector</h1>

    <form method="POST">

        <textarea
            name="email"
            placeholder="Paste email content here..."
            required></textarea>

        <button type="submit">
            Analyze Email
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        Result: {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
